<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HamChart - Помилка підключення</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --error: #FF6B6B;
            --error-dark: #E85555;
            --primary: #FF6B35;
            --dark: #0F0F1E;
            --text: #FFFFFF;
            --text-dim: rgba(160, 160, 176, 0.7);
            --gradient-main: linear-gradient(135deg, #0F0F1E 0%, #1A1A2E 50%, #2E1A1A 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--gradient-main);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* Анімований фон з акцентом на червоний */
        .mesh-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.4;
            pointer-events: none;
        }

        .mesh-gradient {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: meshMove 12s ease-in-out infinite;
        }

        .mesh-1 { width: 350px; height: 350px; background: radial-gradient(circle, var(--error) 0%, transparent 70%); top: -5%; left: -5%; }
        .mesh-2 { width: 450px; height: 450px; background: radial-gradient(circle, #411d1d 0%, transparent 70%); bottom: -10%; right: -5%; }

        @keyframes meshMove {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20px, 20px) scale(1.05); }
        }

        /* Контент помилки */
        .error-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
            max-width: 320px;
        }

        .error-icon {
            font-size: 64px;
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 0 20px rgba(255, 107, 107, 0.4));
            animation: shake 0.5s ease-in-out infinite alternate;
        }

        .error-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, var(--error) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .error-message {
            font-size: 15px;
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Кнопка оновлення */
        .btn-retry {
            padding: 14px 40px;
            background: rgba(255, 107, 107, 0.1);
            border: 2px solid var(--error);
            color: var(--error);
            border-radius: 100px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-block;
            font-family: 'Poppins', sans-serif;
        }

        .btn-retry:active {
            transform: scale(0.95);
            background: var(--error);
            color: white;
        }

        .footer-text {
            position: absolute;
            bottom: 40px;
            font-size: 11px;
            color: rgba(255, 107, 107, 0.4);
            letter-spacing: 1.5px;
            z-index: 10;
        }

        @keyframes shake {
            from { transform: rotate(-5deg); }
            to { transform: rotate(5deg); }
        }

        /* Плавна поява контенту */
        .error-container {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="mesh-background">
        <div class="mesh-gradient mesh-1"></div>
        <div class="mesh-gradient mesh-2"></div>
    </div>

    <div class="error-container">
        <div class="error-icon">🔌</div>
        <h1 class="error-title">Сервер не відповідає</h1>
        <p class="error-message">
            На жаль, виникла проблема з підключенням до мережі. Перевірте інтернет або спробуйте пізніше.
        </p>
        <button class="btn-retry" onclick="location.reload()">Повторити спробу</button>
    </div>

    <div class="footer-text">
        @Hamster_Studiog 2026
    </div>

</body>
</html>
