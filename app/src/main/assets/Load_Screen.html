<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HamChart - Loading</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF6B35;
            --primary-dark: #E85528;
            --secondary: #4ECDC4;
            --accent: #FFD93D;
            --dark: #0F0F1E;
            --text: #FFFFFF;
            --text-dim: rgba(160, 160, 176, 0.6);
            --gradient-main: linear-gradient(135deg, #0F0F1E 0%, #1A1A2E 50%, #16213E 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--gradient-main);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            /* Покращення відображення шрифтів */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Анімований фон (Mesh) */
        .mesh-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.5;
            pointer-events: none;
        }

        .mesh-gradient {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: meshMove 10s ease-in-out infinite;
            will-change: transform;
        }

        .mesh-1 { width: 300px; height: 300px; background: radial-gradient(circle, var(--primary) 0%, transparent 70%); top: -5%; left: -10%; }
        .mesh-2 { width: 400px; height: 400px; background: radial-gradient(circle, var(--secondary) 0%, transparent 70%); bottom: -10%; right: -10%; animation-delay: 2s; }

        @keyframes meshMove {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }

        /* Контент заставки */
        .splash-content {
            position: relative;
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .logo-container {
            /* Фікс якості: змушуємо браузер використовувати GPU */
            animation: pulse 2.5s ease-in-out infinite;
            will-change: transform;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform: translateZ(0);
        }

        .logo-ham {
            font-size: 56px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 50px rgba(255, 107, 53, 0.4);
            letter-spacing: -1px;
            /* Додатковий захист від замилювання */
            transform: translateZ(0);
        }

        /* Індикатор завантаження */
        .loader-bar {
            width: 160px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
            position: relative;
        }

        .loader-progress {
            width: 60px;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            border-radius: 10px;
            position: absolute;
            animation: infiniteLoading 1.8s infinite ease-in-out;
        }

        /* Копірайт */
        .footer-text {
            position: absolute;
            bottom: 40px;
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 1.5px;
            font-weight: 400;
            z-index: 10;
            text-transform: uppercase;
        }

        /* Оптимізована анімація пульсації */
        @keyframes pulse {
            0%, 100% { 
                transform: scale(1) translateZ(0); 
                opacity: 1; 
            }
            50% { 
                /* Зменшуємо не сильно, щоб не втрачати піксельну сітку */
                transform: scale(0.98) translateZ(0); 
                opacity: 0.85; 
            }
        }

        @keyframes infiniteLoading {
            0% { left: -70px; }
            100% { left: 170px; }
        }
    </style>
</head>
<body>

    <div class="mesh-background">
        <div class="mesh-gradient mesh-1"></div>
        <div class="mesh-gradient mesh-2"></div>
    </div>

    <div class="splash-content">
        <div class="logo-container">
            <h1 class="logo-ham">🚀 HamChart</h1>
        </div>
        <div class="loader-bar">
            <div class="loader-progress"></div>
        </div>
    </div>

    <div class="footer-text">
        @Hamster_Studiog 2026
    </div>

</body>
</html>
